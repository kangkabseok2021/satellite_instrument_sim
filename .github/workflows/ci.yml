name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── C++ build + GoogleTest ─────────────────────────────────────────────────
  cpp:
    name: C++ (GoogleTest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_DEFAULT_CMP0135=NEW

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: ctest --test-dir build --output-on-failure -V

  # ── Python pytest ──────────────────────────────────────────────────────────
  python:
    name: Python pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest tests_python/ -v --tb=short

  # ── Docker build check ─────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sim image
        run: docker build -f Dockerfile.sim -t satellite-sim:ci .

      - name: Build proc image
        run: docker build -f Dockerfile.proc -t satellite-proc:ci .
